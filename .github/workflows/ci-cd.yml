name: CI/CD Pipeline (Enhanced)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run script tests'
        required: false
        default: 'true'
      security_audit:
        description: 'Run security audit'
        required: false
        default: 'true'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository'

jobs:
  # ============================================
  # Job 1: Script Validation & Testing
  # ============================================
  scripts-validation:
    name: Scripts Validation & Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run script tests
        working-directory: scripts
        run: |
          echo "🧪 Running Heikeji Mall Scripts Test Suite..."
          node run-tests.js
        continue-on-error: true

      - name: Validate PowerShell scripts syntax
        run: |
          echo "📝 Validating PowerShell scripts..."
          find . -name "*.ps1" -type f | while read script; do
            if command -v pwsh &> /dev/null; then
              echo "Checking: $script"
              pwsh -NoProfile -Command "try { \$null = [System.Management.Automation.Language.Parser]::ParseFile('$script', [ref]\$null, [ref]\$null) } catch { Write-Error \"Parse error in \$script: \$_\"; exit 1 }" || true
            else
              echo "⚠️ PowerShell not available, skipping PS1 validation"
            fi
          done

      - name: Validate Shell scripts syntax
        run: |
          echo "📝 Validating Shell scripts..."
          find . -name "*.sh" -type f | while read script; do
            echo "Checking: $script"
            bash -n "$script" || { echo "❌ Syntax error in $script"; exit 1; }
          done

      - name: Check logger utility
        run: |
          echo "🔧 Testing logger utility..."
          cd scripts
          node logger.js --help
          node logger.js "Test message from CI"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: script-test-results
          path: |
            logs/*.log
            test-results/

  # ============================================
  # Job 2: Code Quality Checks
  # ============================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: scripts-validation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: heikeji-web/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: heikeji-web
        run: npm ci
      
      - name: Run ESLint
        working-directory: heikeji-web
        run: npm run lint --if-present
      
      - name: Run dev-tools health check
        working-directory: heikeji-web
        run: npx scripts/dev-tools.mjs health-check || true
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Run backend lint and format check
        run: mvn checkstyle:check spotless:check -DskipTests || true

  # ============================================
  # Job 3: Enhanced Security Audit
  # ============================================
  security-audit:
    name: Enhanced Security Audit
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event.inputs.security_audit != 'false'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies for audit tools
        run: npm install -g npm-audit-resolver
      
      - name: Run npm audit (frontend)
        working-directory: heikeji-web
        run: |
          echo "🔒 Running npm audit..."
          npm audit --audit-level=moderate || true
          npm audit fix || true
      
      - name: Run custom security audit script
        run: |
          echo "🔍 Running comprehensive security scan..."
          node scripts/security-audit.js || true
      
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
      
      - name: Run dependency vulnerability check
        working-directory: heikeji-web
        run: npm audit --json > audit-report.json || true
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            security-reports/**/*.json
            security-reports/**/*.html
            audit-report.json

  # ============================================
  # Job 4: Frontend Tests
  # ============================================
  frontend-test:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest
    needs: security-audit
    
    services:
      mock-api:
        image: node:20-alpine
        options: >-
          --health-cmd "curl -f http://localhost:5173/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          PORT: 5173
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: heikeji-web/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: heikeji-web
        run: npm ci
      
      - name: Run unit tests
        working-directory: heikeji-web
        run: npm run test:unit --if-present || npm test -- --coverage || true
      
      - name: Run integration tests
        working-directory: heikeji-web
        run: npm run test:e2e --if-present || true
      
      - name: Check code coverage thresholds
        working-directory: heikeji-web
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "📊 Coverage Summary:"
            cat coverage/coverage-summary.json
          fi
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            heikeji-web/coverage/
            test-results/

  # ============================================
  # Job 5: Backend Build & Test
  # ============================================
  backend-build:
    name: Backend Build & Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heikeji_mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Initialize database
        run: |
          echo "⏳ Waiting for MySQL to be ready..."
          sleep 10
          
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS heikeji_mall;" || true
          
          for sql_file in sql/data/seed/*.sql; do
            if [ -f "$sql_file" ]; then
              echo "📥 Importing: $sql_file"
              mysql -h 127.0.0.1 -uroot -proot heikeji_mall < "$sql_file" || true
            fi
          done
      
      - name: Compile project
        run: mvn clean compile -DskipTests
      
      - name: Run unit tests
        run: mvn test -Dtest="**/*Test.java" -DfailIfNoTests=false
        continue-on-error: true
      
      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar

  # ============================================
  # Job 6: Frontend Production Build
  # ============================================
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs: frontend-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: heikeji-web/package-lock.json
      
      - name: Install dependencies
        working-directory: heikeji-web
        run: npm ci
      
      - name: Run build analysis
        working-directory: heikeji-web
        run: npx scripts/dev-tools.mjs analyze-bundle || true
      
      - name: Build production bundle
        working-directory: heikeji-web
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Check bundle size
        working-directory: heikeji-web
        run: |
          echo "📦 Bundle Size Analysis:"
          du -sh dist/*
          ls -lh dist/assets/*.js | awk '{print $5, $9}'
      
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: heikeji-web/dist/

  # ============================================
  # Job 7: Performance Benchmark (PR only)
  # ============================================
  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Start static server
        run: |
          npx serve dist -l 3000 &
          sleep 5
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/products
            http://localhost:3000/orders
          uploadArtifacts: true
        continue-on-error: true
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: '.lighthouseci/**'

  # ============================================
  # Job 8: Deploy to Development
  # ============================================
  deploy-dev:
    name: Deploy to Development Environment
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: https://dev.heikeji.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Deploy to development server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          DEV_SERVER: ${{ secrets.DEV_SERVER_HOST }}
          DEV_USER: ${{ secrets.DEV_USER }}
        run: |
          echo "🚀 Deploying to development environment..."
          
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "Deploying frontend..."
          rsync -avz --delete artifacts/frontend-dist/ $DEV_USER@$DEV_SERVER:/var/www/heikeji-dev/ || true
          
          echo "✅ Development deployment completed!"
      
      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://dev.heikeji.example.com/health || echo "Health check pending..."

  # ============================================
  # Job 9: Deploy to Production
  # ============================================
  deploy-prod:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, performance-benchmark]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://www.heikeji.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Git Tag
        id: tag_version
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${GITHUB_SHA:0:7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git tag $VERSION || true
          git push origin $VERSION || true
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SERVER: ${{ secrets.PROD_SERVER_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "Deploying frontend..."
          rsync -avz --delete artifacts/frontend-dist/ $PROD_USER@$PROD_SERVER:/var/www/heikeji-prod/ || true
          
          echo "✅ Production deployment completed!"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.version }}
          name: Release ${{ steps.tag_version.outputs.version }}
          body: |
            ## 🚀 Automated Release
            
            **Version:** ${{ steps.tag_version.outputs.version }}
            **Commit:** ${{ github.sha }}
            
            ### Changes
            - Auto-deployed from main branch
            - Includes all latest changes
            
            ### Artifacts
            - Frontend build
            - Backend JARs
          files: |
            artifacts/backend-jars/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 10: Notifications
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()
    
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [[ "${{ needs.deploy-dev.result }}" == "success" ]] || [[ "${{ needs.deploy-prod.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Heikeji Mall CI/CD Pipeline ${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Heikeji Mall CI/CD*\nStatus: ${{ steps.status.outputs.status == 'success' && '✅ Success' || '❌ Failed' }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_EMAIL }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI/CD ${{ steps.status.outputs.status }} - ${{ github.repository }}"
          body: |
            The CI/CD pipeline has completed.
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ steps.status.outputs.status }}
            
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ci-cd@heikeji-mall.com
          content_type: text/plain
        if: ${{ secrets.SMTP_EMAIL != '' }}

  # ============================================
  # Final Summary
  # ============================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [scripts-validation, code-quality, security-audit, frontend-test, backend-build, frontend-build, notify]
    if: always()
    
    steps:
      - name: Generate summary report
        run: |
          echo "## 📊 Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts Validation | ${{ needs/scripts-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs/code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs/security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs/frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs/backend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs/frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Duration:** ${{ jobs.pipeline-summary.steps.generate-summary-report.outputs.duration }}" >> $GITHUB_STEP_SUMMARY
