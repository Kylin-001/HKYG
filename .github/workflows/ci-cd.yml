name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'heikeji-frontend/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: heikeji-frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: heikeji-frontend
        run: npm run lint
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run backend lint and format check
        run: mvn checkstyle:check spotless:check
        continue-on-error: true

  # 安全审计
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'heikeji-frontend/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: heikeji-frontend
        run: npm ci
      
      - name: Run npm audit
        working-directory: heikeji-frontend
        run: npm run security:check
      
      - name: Run custom security audit
        working-directory: heikeji-frontend
        run: node ../scripts/security-audit.js
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: |
            security-reports/*.json
            security-reports/*.html

  # 前端测试
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: security-audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'heikeji-frontend/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: heikeji-frontend
        run: npm ci
      
      - name: Run unit tests
        working-directory: heikeji-frontend
        run: npm run test:coverage
      
      - name: Check test coverage
        working-directory: heikeji-frontend
        run: npm run test:coverage:monitor
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            heikeji-frontend/coverage/
            heikeji-frontend/coverage-reports/

  # 后端构建
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heikeji_mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -uroot -proot heikeji_mall < sql/schema/00_create_database.sql || true
          mysql -h 127.0.0.1 -uroot -proot heikeji_mall < sql/schema/01_init_tables.sql || true
      
      - name: Build with Maven
        run: mvn clean compile -DskipTests
      
      - name: Run backend tests
        run: mvn test -Dtest="**/*Test.java"
        continue-on-error: true

  # 前端构建
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'heikeji-frontend/package-lock.json'
      
      - name: Install frontend dependencies
        working-directory: heikeji-frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: heikeji-frontend
        run: npm run build
      
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: heikeji-frontend/dist/

  # 部署到开发环境
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.heikeji.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: heikeji-frontend/dist/
      
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
      
      - name: Deploy to dev server
        run: |
          echo "Deploying to development environment..."
          # 这里添加实际的部署命令
          # 例如：rsync 或 scp 命令
          echo "Deployment completed successfully!"

  # 部署到生产环境
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://www.heikeji.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            heikeji-gateway/target/*.jar
            heikeji-admin/target/*.jar
            service-user/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'CI/CD Pipeline ${{ job.status }}: ${{ github.repository }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'CI/CD ${{ job.status }} for ${{ github.repository }}'
          body: 'The CI/CD pipeline has ${{ job.status }}. Repository: ${{ github.repository }}, Commit: ${{ github.sha }}'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ci-cd@heikeji.example.com
        if: ${{ secrets.SMTP_SERVER != '' }}

  # 性能基准测试
  performance-test:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: heikeji-frontend/dist/
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      
      - name: Start services for testing
        run: |
          # 这里启动测试所需的服务
          echo "Services started for performance testing"
      
      - name: Run performance tests
        run: |
          # 这里运行性能测试脚本
          echo "Performance tests completed"
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: performance-reports/