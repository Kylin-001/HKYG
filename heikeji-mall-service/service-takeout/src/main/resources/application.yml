server:
  port: 8005

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  application:
    name: service-takeout
  datasource:
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectTimeout=60000&socketTimeout=60000&allowPublicKeyRetrieval=true
    username: hkyg
    password: Mysql@8Root!2025
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  # 禁用Nacos服务发现和配置检查，避免启动错误
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 192.168.186.128:8848
        namespace: ""  # public命名空间使用空字符串
        cluster-name: DEFAULT
        register-enabled: true
        # 心跳配置优化
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      config:
        import-check:
          enabled: false
        enabled: false
  # Redis配置
  redis:
    enabled: false
  autoconfigure:
    exclude:
      - io.github.resilience4j.autoconfigure.Resilience4jAutoConfiguration
      - io.github.resilience4j.autoconfigure.CircuitBreakerAutoConfiguration
      - io.github.resilience4j.autoconfigure.CircuitBreakerConfigurationOnMissingBean
      - io.github.resilience4j.autoconfigure.RetryAutoConfiguration
      - io.github.resilience4j.autoconfigure.RateLimiterAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.health.RedisHealthContributorAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisCacheAutoConfiguration

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always


mybatis-plus:
  mapper-locations: classpath*:com/heikeji/mall/takeout/mapper/*.xml
  type-aliases-package: com.heikeji.mall.takeout.entity
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
    validation-mode: NONE

# 文件上传配置
file:
  upload:
    path: ./upload/images
    # 外部访问路径
    access-path: /upload/images/**

logging:
  level:
    root: info
    com.heikeji.mall.takeout: debug