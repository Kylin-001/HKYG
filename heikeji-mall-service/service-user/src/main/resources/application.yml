server:
  port: 8085

spring:
  application:
    name: service-user
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  autoconfigure:
    # 排除Spring Boot Actuator的安全自动配置，避免缺少HttpSecurity bean导致启动失败
    exclude: 
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectTimeout=60000&socketTimeout=60000&allowPublicKeyRetrieval=true
    username: hkyg
    password: Mysql@8Root!2025
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 30000
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 600000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 50
      filters: stat,wall,log4j2
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=3000
      use-global-data-source-stat: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        allow: 127.0.0.1
  # Redis配置
  data:
    redis:
      enabled: true
      host: 192.168.186.128
      port: 6379
      password: Redis@hkyg
      database: 0
      timeout: 3000
  # RabbitMQ配置
  rabbitmq:
    enabled: false
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 30000
  # Nacos服务发现配置
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 192.168.186.128:8848
        namespace: ""
        cluster-name: DEFAULT
        group: DEFAULT_GROUP
        register-enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
        ephemeral: true
        metadata:
          version: "1.0.0"
          region: "dev"
      config:
        enabled: false
        import-check:
          enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.heikeji.mall.user.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.heikeji: debug
    org.springframework: info

# 配置Spring Boot Actuator健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

# 自定义安全配置，允许健康端点访问
security:
  ignored-paths: /actuator/**,/swagger-ui.html,/swagger-resources/**,/v2/api-docs,/webjars/**
