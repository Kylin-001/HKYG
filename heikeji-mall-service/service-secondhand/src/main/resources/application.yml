server:
  port: 8006
  servlet:
    context-path: /api/secondhand

spring:
  application:
    name: service-secondhand
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
        namespace: public
      config:
        import-check:
          enabled: false
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectTimeout=60000&socketTimeout=60000&allowPublicKeyRetrieval=true
    username: hkyg
    password: Mysql@8Root!2025
    type: com.alibaba.druid.pool.DruidDataSource

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

mybatis-plus:
  mapper-locations: classpath:mapper/secondhand/**/*.xml
  type-aliases-package: com.heikeji.mall.secondhand.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.heikeji.mall.secondhand: debug
    com.baomidou.mybatisplus: debug

# 自定义配置
secondhand:
  upload:
    path: /opt/upload/secondhand
    max-size: 10MB