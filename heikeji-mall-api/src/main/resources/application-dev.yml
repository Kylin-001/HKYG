server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    max-threads: 1000
    min-spare-threads: 20

spring:
  # 服务注册与发现
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 0
    password: # 开发环境可以留空
    timeout: 60000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# 熔断器配置（基于Resilience4j）
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
      orderService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 90s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
      paymentService:
        failure-rate-threshold: 30
        wait-duration-in-open-state: 120s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    instances:
      defaultRetry:
        max-attempts: 3
        wait-duration: 500ms
  ratelimiter:
    instances:
      productRateLimiter:
        limit-refresh-period: 1s
        limit-for-period: 30
        timeout-duration: 100ms
      orderRateLimiter:
        limit-refresh-period: 1s
        limit-for-period: 20
        timeout-duration: 100ms
      paymentRateLimiter:
        limit-refresh-period: 1s
        limit-for-period: 15
        timeout-duration: 100ms

# Spring Cloud LoadBalancer配置（替代Ribbon）
spring:
  cloud:
    loadbalancer:
      instances:
        service-user: true
        service-product: true
        service-order: true
        service-payment: true
        service-delivery: true
        service-takeout: true
        service-campus: true
        service-member: true
      ribbon:
        enabled: false