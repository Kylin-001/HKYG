version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: heikeji-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/data:/home/nacos/data
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - heikeji-network
    restart: unless-stopped

networks:
  heikeji-network:
    driver: bridge
