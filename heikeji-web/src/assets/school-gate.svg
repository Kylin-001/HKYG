<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#E0F6FF"/>
      <stop offset="100%" style="stop-color:#F0F8FF"/>
    </linearGradient>
    
    <!-- 地面渐变 -->
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7C59"/>
      <stop offset="100%" style="stop-color:#2D5A3D"/>
    </linearGradient>
    
    <!-- 建筑渐变 -->
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9D6DF"/>
      <stop offset="50%" style="stop-color:#E8EEF2"/>
      <stop offset="100%" style="stop-color:#C9D6DF"/>
    </linearGradient>
    
    <!-- 柱子渐变 -->
    <linearGradient id="pillarGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8C5D0"/>
      <stop offset="30%" style="stop-color:#F0F4F8"/>
      <stop offset="70%" style="stop-color:#F0F4F8"/>
      <stop offset="100%" style="stop-color:#B8C5D0"/>
    </linearGradient>
    
    <!-- 科大蓝渐变 -->
    <linearGradient id="usthBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000AB0"/>
      <stop offset="100%" style="stop-color:#000880"/>
    </linearGradient>
  </defs>
  
  <!-- 天空背景 -->
  <rect width="1440" height="600" fill="url(#skyGradient)"/>
  
  <!-- 云朵 -->
  <g fill="#FFFFFF" opacity="0.8">
    <ellipse cx="200" cy="100" rx="80" ry="30"/>
    <ellipse cx="240" cy="90" rx="60" ry="25"/>
    <ellipse cx="160" cy="95" rx="50" ry="20"/>
    
    <ellipse cx="1100" cy="80" rx="100" ry="35"/>
    <ellipse cx="1160" cy="70" rx="70" ry="28"/>
    <ellipse cx="1050" cy="75" rx="60" ry="22"/>
    
    <ellipse cx="600" cy="120" rx="70" ry="25" opacity="0.6"/>
    <ellipse cx="850" cy="100" rx="80" ry="28" opacity="0.7"/>
  </g>
  
  <!-- 远景树木 -->
  <g fill="#3D6B4F">
    <ellipse cx="100" cy="480" rx="40" ry="80"/>
    <ellipse cx="150" cy="470" rx="35" ry="70"/>
    <ellipse cx="50" cy="485" rx="30" ry="60"/>
    
    <ellipse cx="1300" cy="475" rx="45" ry="85"/>
    <ellipse cx="1250" cy="480" rx="38" ry="75"/>
    <ellipse cx="1350" cy="485" rx="32" ry="65"/>
    
    <ellipse cx="300" cy="490" rx="25" ry="50"/>
    <ellipse cx="1140" cy="495" rx="28" ry="55"/>
  </g>
  
  <!-- 地面/草坪 -->
  <rect x="0" y="450" width="1440" height="150" fill="url(#groundGradient)"/>
  
  <!-- 道路 -->
  <path d="M 400 600 L 550 450 L 890 450 L 1040 600 Z" fill="#8B9DAE" opacity="0.6"/>
  <path d="M 550 450 L 890 450 L 890 600 L 550 600 Z" fill="#9AACBC" opacity="0.5"/>
  
  <!-- 校门主结构 -->
  <g transform="translate(220, 150)">
    <!-- 左侧门柱 -->
    <rect x="0" y="50" width="120" height="350" fill="url(#pillarGradient)" rx="5"/>
    <rect x="10" y="60" width="100" height="330" fill="#E8EEF2" rx="3" opacity="0.5"/>
    
    <!-- 右侧门柱 -->
    <rect x="880" y="50" width="120" height="350" fill="url(#pillarGradient)" rx="5"/>
    <rect x="890" y="60" width="100" height="330" fill="#E8EEF2" rx="3" opacity="0.5"/>
    
    <!-- 门柱顶部装饰 -->
    <rect x="-10" y="20" width="140" height="40" fill="url(#buildingGradient)" rx="3"/>
    <rect x="870" y="20" width="140" height="40" fill="url(#buildingGradient)" rx="3"/>
    
    <!-- 门柱顶部尖顶 -->
    <polygon points="60,20 30,-10 90,-10" fill="url(#buildingGradient)"/>
    <polygon points="940,20 910,-10 970,-10" fill="url(#buildingGradient)"/>
    
    <!-- 主横梁 -->
    <rect x="-30" y="-30" width="1060" height="60" fill="url(#buildingGradient)" rx="5"/>
    <rect x="-20" y="-25" width="1040" height="50" fill="#F5F8FA" rx="3"/>
    
    <!-- 校名区域背景 -->
    <rect x="50" y="-20" width="900" height="40" fill="url(#usthBlue)" rx="3"/>
    
    <!-- 校名文字 -->
    <text x="500" y="8" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">黑龙江科技大学</text>
    
    <!-- 英文校名 -->
    <text x="500" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#000AB0" letter-spacing="2">HEILONGJIANG UNIVERSITY OF SCIENCE AND TECHNOLOGY</text>
    
    <!-- 中间大门框架 -->
    <rect x="350" y="100" width="300" height="300" fill="none" stroke="url(#pillarGradient)" stroke-width="15" rx="5"/>
    
    <!-- 大门横梁装饰 -->
    <rect x="340" y="90" width="320" height="30" fill="url(#buildingGradient)" rx="3"/>
    <rect x="350" y="95" width="300" height="20" fill="url(#usthBlue)" rx="2"/>
    
    <!-- 大门柱子 -->
    <rect x="360" y="130" width="20" height="260" fill="url(#pillarGradient)"/>
    <rect x="620" y="130" width="20" height="260" fill="url(#pillarGradient)"/>
    
    <!-- 校门两侧小门 -->
    <rect x="140" y="150" width="180" height="240" fill="none" stroke="url(#pillarGradient)" stroke-width="8" rx="3"/>
    <rect x="680" y="150" width="180" height="240" fill="none" stroke="url(#pillarGradient)" stroke-width="8" rx="3"/>
    
    <!-- 小门格栅 -->
    <g stroke="#B8C5D0" stroke-width="3">
      <line x1="170" y1="150" x2="170" y2="390"/>
      <line x1="200" y1="150" x2="200" y2="390"/>
      <line x1="230" y1="150" x2="230" y2="390"/>
      <line x1="260" y1="150" x2="260" y2="390"/>
      <line x1="290" y1="150" x2="290" y2="390"/>
      
      <line x1="710" y1="150" x2="710" y2="390"/>
      <line x1="740" y1="150" x2="740" y2="390"/>
      <line x1="770" y1="150" x2="770" y2="390"/>
      <line x1="800" y1="150" x2="800" y2="390"/>
      <line x1="830" y1="150" x2="830" y2="390"/>
    </g>
    
    <!-- 大门格栅 -->
    <g stroke="#B8C5D0" stroke-width="2">
      <line x1="400" y1="130" x2="400" y2="390"/>
      <line x1="430" y1="130" x2="430" y2="390"/>
      <line x1="460" y1="130" x2="460" y2="390"/>
      <line x1="490" y1="130" x2="490" y2="390"/>
      <line x1="520" y1="130" x2="520" y2="390"/>
      <line x1="550" y1="130" x2="550" y2="390"/>
      <line x1="580" y1="130" x2="580" y2="390"/>
    </g>
    
    <!-- 装饰灯柱 -->
    <rect x="45" y="-80" width="10" height="50" fill="#8B9DAE"/>
    <circle cx="50" cy="-85" r="15" fill="#FFF8DC" opacity="0.9"/>
    <circle cx="50" cy="-85" r="8" fill="#FFFACD"/>
    
    <rect x="945" y="-80" width="10" height="50" fill="#8B9DAE"/>
    <circle cx="950" cy="-85" r="15" fill="#FFF8DC" opacity="0.9"/>
    <circle cx="950" cy="-85" r="8" fill="#FFFACD"/>
  </g>
  
  <!-- 前景树木 -->
  <g fill="#2D5A3D">
    <circle cx="80" cy="520" r="50"/>
    <circle cx="130" cy="540" r="40"/>
    <circle cx="40" cy="550" r="35"/>
    <rect x="75" y="520" width="10" height="80" fill="#4A3728"/>
    
    <circle cx="1360" cy="510" r="55"/>
    <circle cx="1300" cy="530" r="42"/>
    <circle cx="1400" cy="540" r="38"/>
    <rect x="1355" y="510" width="10" height="90" fill="#4A3728"/>
  </g>
  
  <!-- 前景灌木丛 -->
  <g fill="#3D6B4F">
    <ellipse cx="250" cy="560" rx="60" ry="30"/>
    <ellipse cx="320" cy="570" rx="50" ry="25"/>
    <ellipse cx="1120" cy="565" rx="55" ry="28"/>
    <ellipse cx="1180" cy="575" rx="45" ry="22"/>
  </g>
</svg>