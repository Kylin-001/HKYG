<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8"/>
      <stop offset="50%" style="stop-color:#F5FAFC"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    
    <!-- 玻璃幕墙渐变 -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="50%" style="stop-color:#BBDEFB"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
    
    <!-- 建筑主体渐变 -->
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    
    <!-- 科大蓝 -->
    <linearGradient id="usthBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000AB0"/>
      <stop offset="100%" style="stop-color:#000880"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 天空背景 -->
  <rect width="1440" height="600" fill="url(#skyGradient)"/>
  
  <!-- 远处城市轮廓 -->
  <g fill="#E0E0E0" opacity="0.5">
    <rect x="100" y="350" width="80" height="150"/>
    <rect x="200" y="320" width="60" height="180"/>
    <rect x="280" y="380" width="100" height="120"/>
    <rect x="1100" y="340" width="90" height="160"/>
    <rect x="1200" y="300" width="70" height="200"/>
    <rect x="1300" y="360" width="80" height="140"/>
  </g>
  
  <!-- 碳谷大厦主体 -->
  <g transform="translate(520, 80)">
    <!-- 主楼基座 -->
    <rect x="-40" y="420" width="480" height="60" fill="#E0E0E0" rx="2"/>
    <rect x="-30" y="430" width="460" height="40" fill="#F5F5F5" rx="2"/>
    
    <!-- 主楼主体 -->
    <rect x="0" y="50" width="400" height="380" fill="url(#buildingGradient)" filter="url(#shadow)"/>
    
    <!-- 顶部装饰结构 -->
    <rect x="-20" y="20" width="440" height="40" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="30" width="400" height="20" fill="url(#usthBlue)"/>
    
    <!-- 顶部塔楼 -->
    <rect x="150" y="-80" width="100" height="100" fill="url(#buildingGradient)" filter="url(#shadow)"/>
    <rect x="160" y="-70" width="80" height="80" fill="url(#glassGradient)" opacity="0.6"/>
    
    <!-- 塔楼顶部 -->
    <polygon points="200,-80 170,-110 230,-110" fill="url(#usthBlue)"/>
    <rect x="190" y="-130" width="20" height="30" fill="#666"/>
    <circle cx="200" cy="-135" r="8" fill="#FFD700"/>
    
    <!-- 玻璃幕墙 - 左翼 -->
    <g fill="url(#glassGradient)" opacity="0.8">
      <rect x="20" y="70" width="80" height="60" rx="2"/>
      <rect x="20" y="140" width="80" height="60" rx="2"/>
      <rect x="20" y="210" width="80" height="60" rx="2"/>
      <rect x="20" y="280" width="80" height="60" rx="2"/>
      <rect x="20" y="350" width="80" height="60" rx="2"/>
    </g>
    
    <!-- 玻璃幕墙 - 中翼 -->
    <g fill="url(#glassGradient)" opacity="0.8">
      <rect x="110" y="70" width="180" height="60" rx="2"/>
      <rect x="110" y="140" width="180" height="60" rx="2"/>
      <rect x="110" y="210" width="180" height="60" rx="2"/>
      <rect x="110" y="280" width="180" height="60" rx="2"/>
      <rect x="110" y="350" width="180" height="60" rx="2"/>
    </g>
    
    <!-- 玻璃幕墙 - 右翼 -->
    <g fill="url(#glassGradient)" opacity="0.8">
      <rect x="300" y="70" width="80" height="60" rx="2"/>
      <rect x="300" y="140" width="80" height="60" rx="2"/>
      <rect x="300" y="210" width="80" height="60" rx="2"/>
      <rect x="300" y="280" width="80" height="60" rx="2"/>
      <rect x="300" y="350" width="80" height="60" rx="2"/>
    </g>
    
    <!-- 窗框线条 -->
    <g stroke="#FFFFFF" stroke-width="2">
      <!-- 横向线条 -->
      <line x1="20" y1="130" x2="380" y2="130"/>
      <line x1="20" y1="200" x2="380" y2="200"/>
      <line x1="20" y1="270" x2="380" y2="270"/>
      <line x1="20" y1="340" x2="380" y2="340"/>
      <!-- 纵向线条 -->
      <line x1="100" y1="70" x2="100" y2="410"/>
      <line x1="300" y1="70" x2="300" y2="410"/>
    </g>
    
    <!-- 入口大厅 -->
    <rect x="120" y="400" width="160" height="50" fill="#333" rx="2"/>
    <rect x="130" y="410" width="140" height="30" fill="url(#glassGradient)" opacity="0.5"/>
    
    <!-- 入口雨棚 -->
    <rect x="100" y="390" width="200" height="15" fill="url(#usthBlue)" rx="2"/>
    
    <!-- 碳谷大厦标识 -->
    <rect x="140" y="35" width="120" height="25" fill="url(#usthBlue)" rx="2"/>
    <text x="200" y="52" text-anchor="middle" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">碳谷大厦</text>
    
    <!-- 装饰性线条 -->
    <line x1="0" y1="50" x2="400" y2="50" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="0" y1="430" x2="400" y2="430" stroke="#E0E0E0" stroke-width="1"/>
  </g>
  
  <!-- 前景绿化带 -->
  <g fill="#4A7C59">
    <ellipse cx="200" cy="520" rx="150" ry="40"/>
    <ellipse cx="1240" cy="520" rx="150" ry="40"/>
    <ellipse cx="720" cy="540" rx="100" ry="30"/>
  </g>
  
  <!-- 前景树木 -->
  <g fill="#2D5A3D">
    <circle cx="150" cy="480" r="40"/>
    <circle cx="200" cy="490" r="35"/>
    <circle cx="100" cy="495" r="30"/>
    <rect x="145" y="480" width="10" height="60" fill="#4A3728"/>
    
    <circle cx="1290" cy="475" r="45"/>
    <circle cx="1240" cy="485" r="38"/>
    <circle cx="1340" cy="490" r="32"/>
    <rect x="1285" y="475" width="10" height="65" fill="#4A3728"/>
  </g>
  
  <!-- 道路 -->
  <rect x="0" y="550" width="1440" height="50" fill="#9E9E9E"/>
  <line x1="0" y1="575" x2="1440" y2="575" stroke="#FFF" stroke-width="2" stroke-dasharray="20,10"/>
</svg>