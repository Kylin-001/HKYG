<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  
  <!-- 科技大厦 - 主楼 -->
  <g transform="translate(400, 50)">
    <!-- 主体 -->
    <rect x="0" y="50" width="120" height="250" fill="url(#buildingGradient)" rx="2"/>
    <!-- 顶部塔楼 -->
    <rect x="40" y="0" width="40" height="50" fill="url(#buildingGradient)"/>
    <polygon points="35,0 60,-20 85,0" fill="url(#buildingGradient)"/>
    <!-- 窗户 -->
    <g fill="rgba(255,255,255,0.2)">
      <rect x="15" y="70" width="15" height="20" rx="1"/>
      <rect x="45" y="70" width="15" height="20" rx="1"/>
      <rect x="75" y="70" width="15" height="20" rx="1"/>
      <rect x="15" y="110" width="15" height="20" rx="1"/>
      <rect x="45" y="110" width="15" height="20" rx="1"/>
      <rect x="75" y="110" width="15" height="20" rx="1"/>
      <rect x="15" y="150" width="15" height="20" rx="1"/>
      <rect x="45" y="150" width="15" height="20" rx="1"/>
      <rect x="75" y="150" width="15" height="20" rx="1"/>
      <rect x="15" y="190" width="15" height="20" rx="1"/>
      <rect x="45" y="190" width="15" height="20" rx="1"/>
      <rect x="75" y="190" width="15" height="20" rx="1"/>
    </g>
    <!-- 入口 -->
    <rect x="45" y="260" width="30" height="40" fill="rgba(255,255,255,0.1)" rx="2"/>
  </g>
  
  <!-- 图书馆 -->
  <g transform="translate(600, 100)">
    <!-- 主体 -->
    <rect x="0" y="30" width="150" height="220" fill="url(#buildingGradient)" rx="2"/>
    <!-- 顶部装饰 -->
    <rect x="10" y="10" width="130" height="20" fill="url(#buildingGradient)"/>
    <polygon points="0,30 75,0 150,30" fill="url(#buildingGradient)"/>
    <!-- 柱子 -->
    <g fill="rgba(255,255,255,0.1)">
      <rect x="20" y="50" width="10" height="180"/>
      <rect x="50" y="50" width="10" height="180"/>
      <rect x="70" y="50" width="10" height="180"/>
      <rect x="90" y="50" width="10" height="180"/>
      <rect x="110" y="50" width="10" height="180"/>
    </g>
    <!-- 入口拱门 -->
    <path d="M 55 250 L 55 200 Q 75 180 95 200 L 95 250 Z" fill="rgba(255,255,255,0.08)"/>
  </g>
  
  <!-- 教学楼群 -->
  <g transform="translate(200, 120)">
    <rect x="0" y="50" width="80" height="180" fill="url(#buildingGradient)" rx="2"/>
    <rect x="90" y="80" width="60" height="150" fill="url(#buildingGradient)" rx="2"/>
    <rect x="160" y="60" width="70" height="170" fill="url(#buildingGradient)" rx="2"/>
    <!-- 窗户 -->
    <g fill="rgba(255,255,255,0.15)">
      <rect x="10" y="65" width="12" height="15"/>
      <rect x="35" y="65" width="12" height="15"/>
      <rect x="60" y="65" width="12" height="15"/>
      <rect x="10" y="95" width="12" height="15"/>
      <rect x="35" y="95" width="12" height="15"/>
      <rect x="60" y="95" width="12" height="15"/>
    </g>
  </g>
  
  <!-- 体育馆 -->
  <g transform="translate(800, 150)">
    <!-- 圆顶 -->
    <ellipse cx="75" cy="80" rx="75" ry="60" fill="url(#buildingGradient)"/>
    <!-- 主体 -->
    <rect x="20" y="80" width="110" height="120" fill="url(#buildingGradient)"/>
    <!-- 入口 -->
    <rect x="55" y="140" width="40" height="60" fill="rgba(255,255,255,0.08)" rx="2"/>
  </g>
  
  <!-- 校门 -->
  <g transform="translate(50, 200)">
    <!-- 门柱 -->
    <rect x="0" y="0" width="30" height="150" fill="url(#buildingGradient)"/>
    <rect x="120" y="0" width="30" height="150" fill="url(#buildingGradient)"/>
    <!-- 横梁 -->
    <rect x="-10" y="0" width="170" height="25" fill="url(#buildingGradient)"/>
    <!-- 校名区域 -->
    <rect x="20" y="5" width="110" height="15" fill="rgba(255,255,255,0.1)" rx="1"/>
  </g>
  
  <!-- 树木装饰 -->
  <g fill="rgba(255,255,255,0.1)">
    <!-- 左侧树木 -->
    <circle cx="100" cy="320" r="25"/>
    <circle cx="130" cy="330" r="20"/>
    <circle cx="70" cy="330" r="18"/>
    <rect x="95" y="330" width="10" height="50" fill="rgba(255,255,255,0.08)"/>
    
    <!-- 右侧树木 -->
    <circle cx="1050" cy="310" r="30"/>
    <circle cx="1085" cy="325" r="22"/>
    <circle cx="1015" cy="325" r="20"/>
    <rect x="1045" y="325" width="12" height="55" fill="rgba(255,255,255,0.08)"/>
    
    <!-- 中间树木 -->
    <circle cx="550" cy="340" r="20"/>
    <circle cx="575" cy="350" r="15"/>
    <rect x="548" y="350" width="8" height="40" fill="rgba(255,255,255,0.08)"/>
  </g>
  
  <!-- 地面线条 -->
  <line x1="0" y1="380" x2="1200" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>