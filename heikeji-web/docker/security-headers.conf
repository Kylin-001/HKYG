# ============================================
# 安全响应头配置
# 遵循OWASP安全最佳实践
# ============================================

# 1. X-Content-Type-Options: 防止MIME嗅探
add_header X-Content-Type-Options "nosniff" always;

# 2. X-Frame-Options: 防止点击劫持
add_header X-Frame-Options "SAMEORIGIN" always;

# 3. X-XSS-Protection: 启用浏览器XSS过滤器
add_header X-XSS-Protection "1; mode=block" always;

# 4. Referrer-Policy: 控制Referer头信息泄露
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 5. Content-Security-Policy: 内容安全策略
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    img-src 'self' data: blob: https: *.unsplash.com *.githubusercontent.com;
    font-src 'self' https://fonts.gstatic.com data:;
    connect-src 'self' wss: ws: https://api.heikeji.com;
    media-src 'self' https:;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'self';
    upgrade-insecure-requests
" always;

# 6. Permissions-Policy: 功能权限控制
add_header Permissions-Policy "
    camera=(),
    microphone=(),
    geolocation=(self),
    payment=(),
    usb=(),
    midi=()
" always;

# 7. 清除可能存在的危险头
more_clear_headers 'Server';
more_clear_headers 'X-Powered-By';

