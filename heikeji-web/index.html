<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="黑科易购 - 黑龙江科技大学一站式校园服务平台，提供外卖、购物、学工办理、校园服务等功能" />
    <meta name="keywords" content="黑科易购,黑龙江科技大学,校园服务,外卖,购物" />
    <meta name="theme-color" content="#003B80" />
    <title>黑科易购 - 黑龙江科技大学校园服务平台</title>

    <!-- DNS 预解析 -->
    <link rel="dns-prefetch" href="//localhost:9999" />
    <link rel="dns-prefetch" href="//localhost:8003" />
    <link rel="dns-prefetch" href="//images.unsplash.com" />

    <!-- 预连接 -->
    <link rel="preconnect" href="//localhost:9999" crossorigin />
    <link rel="preconnect" href="//localhost:8003" crossorigin />
    <link rel="preconnect" href="//images.unsplash.com" crossorigin />

    <!-- 预加载关键资源 -->
    <link rel="preload" href="/logo-new.png" as="image" type="image/png" />
    <link rel="preload" href="/images/campus-1.jpg" as="image" type="image/jpeg" fetchpriority="high" />

    <!-- 关键 CSS 内联 - 首屏渲染必需样式 -->
    <style>
      /* 关键路径 CSS - 防止布局偏移和闪烁 */
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;line-height:1.5;color:#1f2937;background:#fff}
      #app{min-height:100vh}
      
      /* Hero 区域关键样式 */
      .hero-section{position:relative;height:600px;overflow:hidden;background:linear-gradient(135deg,#000ab0 0%,#1e3a8a 100%)}
      .hero-split{display:flex;height:100%}
      .hero-left{flex:1;display:flex;align-items:center;padding:0 4rem;position:relative}
      .hero-right{flex:1;position:relative}
      .hero-bg-image{position:absolute;inset:0;background-size:cover;background-position:center}
      
      /* 加载占位符 */
      .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:loading 1.5s infinite}
      @keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
      
      /* 防止字体闪烁 */
      .font-loaded{font-display:swap}
    </style>

    <!-- 开发环境自动清理 Service Worker - 强力版 -->
    <script>
      (function() {
        // 检测是否为开发环境（Vite 开发服务器）
        const isDev = location.port === '5173' || location.port === '5174' || location.port === '5175' || location.port === '5176' || location.port === '5177' || location.port === '5178' || location.port === '5179' || location.port === '5180' || location.port === '5181' || location.port === '5182'
        
        // 强力清理函数
        async function forceClearSW() {
          console.log('[SW Force Clear] 开始强力清理...')
          
          // 1. 注销所有 Service Worker
          if ('serviceWorker' in navigator) {
            try {
              const regs = await navigator.serviceWorker.getRegistrations()
              console.log('[SW Force Clear] 发现 ' + regs.length + ' 个 Service Worker')
              for (const reg of regs) {
                await reg.unregister()
                console.log('[SW Force Clear] 已注销:', reg.scope)
              }
            } catch (e) {
              console.error('[SW Force Clear] 注销失败:', e)
            }
          }
          
          // 2. 清除所有缓存
          if ('caches' in window) {
            try {
              const names = await caches.keys()
              console.log('[SW Force Clear] 发现 ' + names.length + ' 个缓存')
              for (const name of names) {
                await caches.delete(name)
                console.log('[SW Force Clear] 已清除缓存:', name)
              }
            } catch (e) {
              console.error('[SW Force Clear] 清除缓存失败:', e)
            }
          }
          
          // 3. 检查是否需要刷新（如果之前有不同端口的 SW）
          const hasWrongPortSW = sessionStorage.getItem('sw_wrong_port_checked') !== 'true'
          if (hasWrongPortSW) {
            sessionStorage.setItem('sw_wrong_port_checked', 'true')
            // 延迟刷新以确保清理生效
            setTimeout(() => {
              console.log('[SW Force Clear] 刷新页面以应用更改...')
              window.location.reload(true)
            }, 500)
          }
        }
        
        // 立即执行清理
        if (isDev) {
          forceClearSW()
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
