<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="usthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000AB0"/>
      <stop offset="100%" style="stop-color:#000880"/>
    </linearGradient>
  </defs>
  
  <!-- 外圆环 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#usthGradient)" stroke-width="4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#000AB0" stroke-width="1" opacity="0.3"/>
  
  <!-- 内圆背景 -->
  <circle cx="100" cy="100" r="82" fill="#FFFFFF"/>
  
  <!-- 学校主楼建筑轮廓 -->
  <g transform="translate(100, 95)">
    <!-- 主楼主体 -->
    <rect x="-35" y="-25" width="70" height="50" fill="#000AB0" rx="2"/>
    
    <!-- 主楼顶部 -->
    <polygon points="-40,-25 0,-45 40,-25" fill="#000AB0"/>
    
    <!-- 窗户网格 -->
    <g fill="#FFFFFF">
      <!-- 第一层窗户 -->
      <rect x="-25" y="-15" width="8" height="10" rx="1"/>
      <rect x="-10" y="-15" width="8" height="10" rx="1"/>
      <rect x="5" y="-15" width="8" height="10" rx="1"/>
      <rect x="20" y="-15" width="8" height="10" rx="1"/>
      
      <!-- 第二层窗户 -->
      <rect x="-25" y="0" width="8" height="10" rx="1"/>
      <rect x="-10" y="0" width="8" height="10" rx="1"/>
      <rect x="5" y="0" width="8" height="10" rx="1"/>
      <rect x="20" y="0" width="8" height="10" rx="1"/>
      
      <!-- 第三层窗户 -->
      <rect x="-25" y="15" width="8" height="10" rx="1"/>
      <rect x="-10" y="15" width="8" height="10" rx="1"/>
      <rect x="5" y="15" width="8" height="10" rx="1"/>
      <rect x="20" y="15" width="8" height="10" rx="1"/>
    </g>
    
    <!-- 正门 -->
    <rect x="-8" y="20" width="16" height="15" fill="#FFFFFF" rx="1"/>
    
    <!-- 博士帽（顶部装饰） -->
    <g transform="translate(0, -55)">
      <polygon points="-15,0 0,-10 15,0 0,5" fill="#000AB0"/>
      <rect x="-12" y="0" width="24" height="3" fill="#000AB0"/>
      <line x1="12" y1="1.5" x2="20" y2="8" stroke="#000AB0" stroke-width="2"/>
      <circle cx="20" cy="8" r="2" fill="#000AB0"/>
    </g>
    
    <!-- 书籍元素（底部） -->
    <g transform="translate(0, 42)">
      <rect x="-30" y="-3" width="60" height="6" fill="#000AB0" rx="1"/>
      <rect x="-28" y="-8" width="56" height="5" fill="#000880" rx="1"/>
      <line x1="0" y1="-8" x2="0" y2="3" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  
  <!-- 建校年份 -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000AB0">1947</text>
</svg>