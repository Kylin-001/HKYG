version: '3.8'

services:
  # 前端应用
  heikeji-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: heikeji-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - heikeji-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 后端API（Mock或真实后端）
  heikeji-api:
    image: node:20-alpine
    container_name: heikeji-api
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/heikeji
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - REDIS_URL=redis://redis:6379
    command: >
      sh -c "
        if [ -f package.json ]; then
          npm install --production && npm start
        else
          echo 'API服务未实现，使用Mock模式' &&
          npx json-server --watch db.json --port 3000 --host 0.0.0.0
        fi
      "
    volumes:
      - ../heikeji-api:/app:rw
      - api-data:/app/data
    networks:
      - heikeji-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MongoDB数据库
  mongo:
    image: mongo:7.0
    container_name: heikeji-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=heikeji
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - heikeji-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # Redis缓存
  redis:
    image: redis:7.2-alpine
    container_name: heikeji-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    networks:
      - heikeji-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# 网络配置
networks:
  heikeji-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# 数据卷
volumes:
  nginx-logs:
    driver: local
  api-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local
