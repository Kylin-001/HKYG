server:
  port: 8086

spring:
  application:
    name: heikeji-mall-job

  # 禁用Nacos配置检查和服务发现
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: hkyg
    password: Mysql@8Root!2025

  # Redis配置
  redis:
    host: 192.168.186.128
    port: 6379
    password:
    database: 0
    timeout: 3000ms

  # Quartz配置
  quartz:
    job-store-type: memory
    overwrite-existing-jobs: true
    properties:
      org:
        quartz:
          threadPool:
            threadCount: 10
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true

# 日志配置
logging:
  level:
    root: INFO
    com.heikeji: DEBUG
  file:
    name: logs/heikeji-mall-job.log
    max-size: 100MB
    max-history: 7

# 自定义任务配置
job:
  orderAutoCancel: 30
  orderAutoConfirm: 7
  logCleanup: 30
