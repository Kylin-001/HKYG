# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nacos_logs:
    driver: local
  nacos_data:
    driver: local
  rabbitmq_data:
    driver: local

# ==================== 网络 ====================
networks:
  hkyg-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
