name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行ESLint检查
        run: npm run lint

      - name: 运行Prettier检查
        run: npm run format:check

  test-unit:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行单元测试
        run: npm run test:unit

      - name: 生成测试覆盖率报告
        run: npm run test:coverage

      - name: 检查测试覆盖率是否达标
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "测试覆盖率 $COVERAGE% 低于要求的70%"
            exit 1
          else
            echo "测试覆盖率 $COVERAGE% 达到要求"
          fi

      - name: 上传覆盖率报告到Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  test-e2e:
    name: 端到端测试
    runs-on: ubuntu-latest
    needs: test-unit
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装Playwright浏览器
        run: npx playwright install --with-deps

      - name: 运行端到端测试 - ${{ matrix.browser }}
        run: npm run test:e2e:${{ matrix.browser }}

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: 上传测试截图
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: 上传测试视频
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  test-performance:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装Playwright浏览器
        run: npx playwright install --with-deps

      - name: 运行性能测试
        run: npm run test:performance

      - name: 上传性能测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: test-results/performance/
          retention-days: 30

  build:
    name: 构建项目
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e, test-performance]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建生产版本
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 部署到服务器
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /var/www/heikeji-frontend
          SOURCE: dist/

      - name: 发送部署通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            前端项目部署完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  test-report:
    name: 测试报告汇总
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e, test-performance]
    if: always()
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 下载所有测试报告
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: 生成综合测试报告
        run: |
          mkdir -p combined-reports
          echo "# 综合测试报告" > combined-reports/README.md
          echo "## 构建信息" >> combined-reports/README.md
          echo "- 分支: ${{ github.ref }}" >> combined-reports/README.md
          echo "- 提交: ${{ github.sha }}" >> combined-reports/README.md
          echo "- 构建号: ${{ github.run_number }}" >> combined-reports/README.md
          echo "" >> combined-reports/README.md
          
          echo "## 测试结果" >> combined-reports/README.md
          echo "- 单元测试: ${{ needs.test-unit.result }}" >> combined-reports/README.md
          echo "- 端到端测试: ${{ needs.test-e2e.result }}" >> combined-reports/README.md
          echo "- 性能测试: ${{ needs.test-performance.result }}" >> combined-reports/README.md
          echo "" >> combined-reports/README.md
          
          if [ -d "all-reports/coverage-report" ]; then
            echo "## 单元测试覆盖率" >> combined-reports/README.md
            echo "![Coverage](all-reports/coverage-report/coverage-badge.svg)" >> combined-reports/README.md
            echo "" >> combined-reports/README.md
          fi
          
          echo "## 详细报告" >> combined-reports/README.md
          echo "- [单元测试报告](all-reports/coverage-report/index.html)" >> combined-reports/README.md
          
          for browser in chromium firefox webkit; do
            if [ -d "all-reports/playwright-report-$browser" ]; then
              echo "- [E2E测试报告 - $browser](all-reports/playwright-report-$browser/index.html)" >> combined-reports/README.md
            fi
          done
          
          if [ -d "all-reports/performance-report" ]; then
            echo "- [性能测试报告](all-reports/performance-report/index.html)" >> combined-reports/README.md
          fi

      - name: 上传综合测试报告
        uses: actions/upload-artifact@v4
        with:
          name: combined-test-reports
          path: combined-reports/
          retention-days: 30

      - name: 发送测试结果通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            测试流程完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
            单元测试: ${{ needs.test-unit.result }}
            端到端测试: ${{ needs.test-e2e.result }}
            性能测试: ${{ needs.test-performance.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
