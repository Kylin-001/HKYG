name: Scheduled Tests

on:
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: '选择要运行的测试类型'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - unit
        - e2e
        - performance

jobs:
  determine-tests:
    name: 确定测试类型
    runs-on: ubuntu-latest
    outputs:
      run-unit: ${{ steps.check.outputs.run-unit }}
      run-e2e: ${{ steps.check.outputs.run-e2e }}
      run-performance: ${{ steps.check.outputs.run-performance }}
    steps:
      - name: 确定要运行的测试
        id: check
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
          
          RUN_UNIT="false"
          RUN_E2E="false"
          RUN_PERFORMANCE="false"
          
          if [ "$TEST_TYPE" = "all" ] || [ "$TEST_TYPE" = "unit" ]; then
            RUN_UNIT="true"
          fi
          
          if [ "$TEST_TYPE" = "all" ] || [ "$TEST_TYPE" = "e2e" ]; then
            RUN_E2E="true"
          fi
          
          if [ "$TEST_TYPE" = "all" ] || [ "$TEST_TYPE" = "performance" ]; then
            RUN_PERFORMANCE="true"
          fi
          
          echo "run-unit=$RUN_UNIT" >> $GITHUB_OUTPUT
          echo "run-e2e=$RUN_E2E" >> $GITHUB_OUTPUT
          echo "run-performance=$RUN_PERFORMANCE" >> $GITHUB_OUTPUT

  test-unit:
    name: 定时单元测试
    runs-on: ubuntu-latest
    needs: determine-tests
    if: needs.determine-tests.outputs.run-unit == 'true'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行单元测试
        run: npm run test:unit

      - name: 生成测试覆盖率报告
        run: npm run test:coverage

      - name: 检查测试覆盖率是否达标
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "测试覆盖率 $COVERAGE% 低于要求的70%"
            exit 1
          else
            echo "测试覆盖率 $COVERAGE% 达到要求"
          fi

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-coverage-report
          path: coverage/
          retention-days: 7

      - name: 发送单元测试结果通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            定时单元测试完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
            测试覆盖率: $COVERAGE%
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  test-e2e:
    name: 定时端到端测试
    runs-on: ubuntu-latest
    needs: determine-tests
    if: needs.determine-tests.outputs.run-e2e == 'true'
    
    strategy:
      matrix:
        browser: [chromium]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装Playwright浏览器
        run: npx playwright install --with-deps

      - name: 运行端到端测试 - ${{ matrix.browser }}
        run: npm run test:e2e:${{ matrix.browser }}

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scheduled-playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: 发送E2E测试结果通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            定时端到端测试完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
            浏览器: ${{ matrix.browser }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  test-performance:
    name: 定时性能测试
    runs-on: ubuntu-latest
    needs: determine-tests
    if: needs.determine-tests.outputs.run-performance == 'true'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装Playwright浏览器
        run: npx playwright install --with-deps

      - name: 运行性能测试
        run: npm run test:performance

      - name: 上传性能测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scheduled-performance-report
          path: test-results/performance/
          retention-days: 7

      - name: 发送性能测试结果通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            定时性能测试完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  scheduled-report:
    name: 定时测试报告汇总
    runs-on: ubuntu-latest
    needs: [determine-tests, test-unit, test-e2e, test-performance]
    if: always()
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 下载所有测试报告
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: 生成综合测试报告
        run: |
          mkdir -p combined-reports
          echo "# 定时测试报告" > combined-reports/README.md
          echo "## 构建信息" >> combined-reports/README.md
          echo "- 分支: ${{ github.ref }}" >> combined-reports/README.md
          echo "- 提交: ${{ github.sha }}" >> combined-reports/README.md
          echo "- 构建号: ${{ github.run_number }}" >> combined-reports/README.md
          echo "- 运行时间: $(date)" >> combined-reports/README.md
          echo "" >> combined-reports/README.md
          
          echo "## 测试结果" >> combined-reports/README.md
          echo "- 单元测试: ${{ needs.test-unit.result }}" >> combined-reports/README.md
          echo "- 端到端测试: ${{ needs.test-e2e.result }}" >> combined-reports/README.md
          echo "- 性能测试: ${{ needs.test-performance.result }}" >> combined-reports/README.md
          echo "" >> combined-reports/README.md
          
          if [ -d "all-reports/scheduled-coverage-report" ]; then
            echo "## 单元测试覆盖率" >> combined-reports/README.md
            echo "![Coverage](all-reports/scheduled-coverage-report/coverage-badge.svg)" >> combined-reports/README.md
            echo "" >> combined-reports/README.md
          fi
          
          echo "## 详细报告" >> combined-reports/README.md
          echo "- [单元测试报告](all-reports/scheduled-coverage-report/index.html)" >> combined-reports/README.md
          
          if [ -d "all-reports/scheduled-playwright-report-chromium" ]; then
            echo "- [E2E测试报告 - Chromium](all-reports/scheduled-playwright-report-chromium/index.html)" >> combined-reports/README.md
          fi
          
          if [ -d "all-reports/scheduled-performance-report" ]; then
            echo "- [性能测试报告](all-reports/scheduled-performance-report/index.html)" >> combined-reports/README.md
          fi

      - name: 上传综合测试报告
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-combined-test-reports
          path: combined-reports/
          retention-days: 7

      - name: 发送定时测试结果通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            定时测试流程完成！
            分支: ${{ github.ref }}
            提交: ${{ github.sha }}
            单元测试: ${{ needs.test-unit.result }}
            端到端测试: ${{ needs.test-e2e.result }}
            性能测试: ${{ needs.test-performance.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()