server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,application/xml+rss,image/svg+xml
    min-response-size: 1024

spring:
  application:
    name: heikeji-gateway
  
  # 设置Web应用类型为reactive，解决Spring MVC与Spring Cloud Gateway不兼容问题
  main:
    web-application-type: reactive
  
  # 服务发现配置
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 192.168.186.128:8848
      config:
        enabled: false
        import-check:
          enabled: false
    gateway:
      # 路由配置
      routes:
        # 管理后台服务路由
        - id: heikeji-admin
          uri: http://127.0.0.1:8090
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0
        
        # 商品服务路由
        - id: heikeji-mall-product
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=0
        
        # 订单服务路由
        - id: heikeji-mall-order
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/order/**
            - Path=/order/**
          filters:
            - StripPrefix=0
        
        # 用户服务路由
        - id: heikeji-mall-user
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0
        
        # 支付服务路由
        - id: heikeji-mall-payment
          uri: http://127.0.0.1:8004
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=0
        
        # APP服务路由
        - id: heikeji-mall-app
          uri: http://127.0.0.1:8005
          predicates:
            - Path=/api/app/**
          filters:
            - StripPrefix=0
        
        # 二手服务路由
        - id: heikeji-secondhand
          uri: http://127.0.0.1:8006
          predicates:
            - Path=/api/secondhand/**
          filters:
            - StripPrefix=0

        # 配送服务路由
        - id: heikeji-delivery
          uri: http://127.0.0.1:8001
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=0

        # 失物招领服务路由
        - id: heikeji-lostfound
          uri: http://127.0.0.1:8007
          predicates:
            - Path=/api/lostfound/**
          filters:
            - StripPrefix=0

        # 通用服务路由（默认兜底）
        - id: fallback-service
          uri: http://localhost:9999
          predicates:
            - Path=/fallback/**
          filters:
            - StripPrefix=1

      # 全局过滤器配置
      default-filters:
        - name: AddResponseHeader
          args:
            name: X-Response-Time
            value: ${random.uuid}
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Origin, Access-Control-Allow-Credentials
            strategy: RETAIN_UNIQUE
      
      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ["*"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            exposedHeaders: ["Authorization"]
            allowCredentials: true
            maxAge: 3600
      
      # 负载均衡配置
      loadbalancer:
        ribbon:
          enabled: false

  # Redis配置（用于限流）
  # 暂时禁用Redis限流功能，因为Redis 7.0.15 RESP3协议与Lettuce客户端存在兼容性问题
  # redis:
  #   host: localhost
  #   port: 6379
  #   password: Redis@hkyg
  #   database: 1
  #   timeout: 3000
  #   jedis:
  #     pool:
  #       max-active: 8
  #       max-wait: -1
  #       max-idle: 8
  #       min-idle: 0
  #   client-type: jedis

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false

# 日志配置
logging:
  level:
    root: info
    org.springframework.cloud.gateway: debug
    com.heikeji.gateway: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/heikeji-gateway.log
    max-size: 10MB
    max-history: 7

# 自定义配置
gateway:
  # 限流配置
  ratelimit:
    user-rate-limit:
      replenish-rate: 20
      burst-capacity: 40
    ip-rate-limit:
      replenish-rate: 100
      burst-capacity: 200
  
  # 安全配置
  security:
    # 不需要认证的路径
    whitelist:
      - /admin/login
      - /api/user/login
      - /api/user/register
      - /api/product/public/**
      - /fallback/**
    # JWT配置
    jwt:
      secret: heikeji_gateway_jwt_secret_key_2024
      expiration: 3600000
      header: Authorization
      tokenStartWith: Bearer