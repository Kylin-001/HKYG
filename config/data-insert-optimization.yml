# ============================================================
# 数据插入功能 - 性能优化配置
# 文件位置: heikeji-mall-service/service-user/src/main/resources/application.yml
# 或 service-product/src/main/resources/application.yml
# ============================================================

data-insert:
  # 批量插入配置
  batch:
    # 默认分批大小（每批处理的记录数）
    default-batch-size: 100
    # 最大单次请求数量限制
    max-single-request-size: 500
    # 最大允许的分批大小（用于超大文件导入）
    max-batch-size: 1000

    # 异步处理配置
    async:
      enabled: true
      # 异步线程池核心线程数
      thread-pool-core-size: 5
      # 异步线程池最大线程数
      thread-pool-max-size: 20
      # 线程池队列容量
      thread-pool-queue-capacity: 1000
      # 线程存活时间（秒）
      thread-pool-keep-alive-seconds: 60

  # 性能监控阈值
  monitoring:
    # 耗时警告阈值（毫秒）- 超过此值记录警告日志
    warning-threshold-ms: 2000
    # 耗时临界阈值（毫秒）- 超过此值标记为不健康
    critical-threshold-ms: 5000
    # 失败率告警阈值 (0.1 = 10%)
    failure-rate-threshold: 0.1

  # 审计日志配置
  audit:
    enabled: true
    # 最大保留日志数量
    max-log-size: 10000
    # 是否自动脱敏敏感数据
    auto-mask-sensitive-data: true

  # 缓存策略
  cache:
    # 插入后是否清除相关缓存
    evict-on-insert: true
    # 缓存清除策略: ALL / RELATED
    eviction-strategy: ALL

  # 数据验证配置
  validation:
    # 是否启用批量预检查（减少数据库往返）
    enable-batch-precheck: true
    # 唯一性检查超时时间（毫秒）
    uniqueness-check-timeout: 5000

# ============================================================
# 异步线程池配置（如果使用Spring Boot默认线程池则不需要）
# ============================================================
spring:
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 1000
        keep-alive: 60s
        allow-core-thread-timeout: true
      thread-name-prefix: DataInsertAsync-

# ============================================================
# Actuator 监控端点配置
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:data-insert-service}
    export:
      prometheus:
        enabled: true

# ============================================================
# 日志配置（数据插入专用）
# ============================================================
logging:
  level:
    com.heikeji.mall.user.service.UserBatchInsertServiceImpl: INFO
    com.heikeji.mall.user.service.UserBatchInsertServiceImplV2: DEBUG
    com.heikeji.mall.common.service.DataInsertAuditService: INFO
    com.heikeji.mall.common.service.DataInsertMetricsService: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/data-insert.log
    max-size: 100MB
    max-history: 30
