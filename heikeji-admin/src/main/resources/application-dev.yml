server:
  port: 8090

spring:
  application:
    name: heikeji-admin
  
  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.186.128:8848
      config:
        server-addr: 192.168.186.128:8848
        file-extension: yml
    # 禁用Nacos配置检查
    config:
      import-check:
        enabled: false

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: hkyg
    password: Mysql@8Root!2025
    hikari:
      pool-name: HikariCP
      minimum-idle: 5
      idle-timeout: 30000
      maximum-pool-size: 20
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  redis:
    host: 192.168.186.128
    port: 6379
    password: 
    database: 0
    timeout: 3000
  
  # Spring MVC配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  
  main:
    allow-bean-definition-overriding: true

# MyBatis-Plus配置
mybatis-plus:
  type-aliases-package: com.heikeji.admin.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'

# 管理员安全配置
admin:
  security:
    token:
      expireTime: 1440
      tokenHead: "Bearer "
      header: "Authorization"
      tokenStartWith: "Bearer "
