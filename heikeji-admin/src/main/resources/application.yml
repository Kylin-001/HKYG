server:
  port: 8091
  servlet:
    context-path: /admin

spring:
  application:
    name: heikeji-admin
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://192.168.186.128:3306/heikeji_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: hkyg
    password: Mysql@8Root!2025
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 192.168.186.128:8848
        namespace: ""  # public命名空间使用空字符串
        ip: 127.0.0.1
        cluster-name: DEFAULT
        register-enabled: true
        # 心跳配置优化
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
      config:
        import-check:
          enabled: false
        enabled: false
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

# 日志配置
logging:
  level:
    root: info
    com.heikeji: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# 自定义配置
admin:
  security:
    # 是否开启验证码
    captchaEnabled: true
    # 是否开启记住我
    rememberMeEnabled: true
    # token配置
    token:
      # token有效期（默认30分钟）
      expireTime: 30
      # 令牌自定义标识
      header: Authorization
      # 令牌前缀
      tokenStartWith: Bearer

# 健康检查端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always